<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darknet Operative</title>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    // Load Strudel via dynamic import from unpkg (most reliable for browser)
    (async () => {
      try {
        const { note, irand, start, stop } = await import('https://cdn.jsdelivr.net/npm/@strudel/core@latest/dist/index.mjs');
        window.Strudel = { note, irand, start, stop };
        console.log('✓ Strudel dynamically imported');
      } catch (e) {
        console.warn('Strudel import failed:', e.message);
        // Fall back to simple sine wave if Strudel unavailable
        window.Strudel = null;
      }
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
